
services:
  # 1. Message Broker: Apache Kafka (Chạy chế độ KRaft, không cần Zookeeper)
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - backend
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - backend
  # 2. Data Lake (Cold Storage): MinIO (Giải pháp thay thế S3)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9002:9000" # API Port (đổi thành 9002 ở localhost để tránh trùng với ClickHouse)
      - "9001:9001" # Web UI Port
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  # 3. Data Warehouse (Hot Storage): ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123" # HTTP port (Dùng để query qua API hoặc DBeaver/DataGrip)
      - "9000:9000" # Native port (Dùng cho các client kết nối trực tiếp)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: password
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - backend
  ingestion:
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    ports:
      - "8002:8080"
    depends_on:
      - kafka
    networks:
      - backend
  # 5. Database cho Airflow
  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - backend

  # 6. Điều phối viên: Apache Airflow
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_DB_UPGRADE=True
      - _AIRFLOW_WWW_USER_CREATE=True
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas kafka-python boto3 pyarrow
    volumes:
      - ../orchestration/dags:/opt/airflow/dags
      - ../processing:/opt/processing 
    ports:
      - "8086:8080"
    command: standalone
    networks:
      - backend
  stream-processor:
    build: 
      context: ../processing
      dockerfile: Dockerfile
    container_name: stream-processor
    command: python -u streaming/streaming_processor.py
    restart: unless-stopped 
    depends_on:
      - kafka
      - redis
      - clickhouse
    environment:
      - KAFKA_BROKER=kafka:9092
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - PYTHONUNBUFFERED=1
    networks:
      - backend
volumes:
  kafka_data:
  minio_data:
  clickhouse_data:
  airflow_db_data:

networks:
  backend: